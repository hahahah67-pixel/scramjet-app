services:
  scramjet:
    build: .
    container_name: scramjet
    ports:
      - "8080:8080"
    command: bash ./start.sh
    restart: always

  ultraviolet:
    image: diffusehyperion/ultraviolet
    container_name: ultraviolet
    ports:
      - "8081:8080"
    restart: "no"
    profiles:
      - disabled

networks:
  default:
    name: scramjet-net
